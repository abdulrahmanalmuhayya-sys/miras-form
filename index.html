<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نموذج تقييم المنافسة - مِراس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B1B45;
    --orange:#F4793C;
    --orange-2:#e9622a;
    --green:#1C8C6C;
    --yellow:#F6B53D;
    --sky:#6FC4E8;
    --cream:#FBF9F4;
    --paper:#FFFFFF;
    --ink:#1B1B45;
    --muted:#6b6b85;
    --line:#e9e6da;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Cairo','Tajawal',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
  }
  .wrap{max-width:880px;margin:0 auto;padding:28px 18px 60px;}

  /* header */
  .header{
    position:relative;
    background:var(--navy);
    border-radius:var(--radius);
    padding:30px 26px 26px;
    overflow:hidden;
    margin-bottom:26px;
    box-shadow:0 10px 30px rgba(27,27,69,.15);
  }
  .header::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 100% 0%, rgba(244,121,60,.35), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(111,196,232,.25), transparent 40%);
  }
  .header-top{display:flex;align-items:center;justify-content:space-between;gap:14px;position:relative;z-index:1;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    font-weight:900;font-size:22px;color:#fff;
    background:linear-gradient(135deg,var(--orange),var(--yellow));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:1px;
  }
  .brand-sub{font-size:11px;color:var(--sky);font-weight:600;}
  .badge{
    background:var(--orange);
    color:#fff;font-weight:700;font-size:13px;
    padding:8px 16px;border-radius:30px;
    transform:rotate(-3deg);
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    white-space:nowrap;
  }
  .title{
    position:relative;z-index:1;
    color:#fff;font-size:30px;font-weight:900;margin:22px 0 6px;
  }
  .subtitle{position:relative;z-index:1;color:#cfd0e8;font-size:14.5px;font-weight:500;line-height:1.8;max-width:560px;}
  .strip{height:6px;border-radius:6px;margin-top:20px;background:linear-gradient(90deg,var(--sky),var(--green),var(--yellow),var(--orange));position:relative;z-index:1;}

  /* card */
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:18px;
  }
  .card h2{
    font-size:16px;margin:0 0 16px;color:var(--navy);font-weight:800;
    display:flex;align-items:center;gap:8px;
  }
  .step-num{
    width:26px;height:26px;border-radius:50%;
    background:var(--navy);color:#fff;font-size:13px;font-weight:800;
    display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  }

  /* stage selector */
  .pill-group{display:flex;gap:12px;flex-wrap:wrap;}
  .pill{
    flex:1;min-width:150px;
    border:2px solid var(--line);
    background:var(--cream);
    border-radius:14px;
    padding:16px;
    text-align:center;
    cursor:pointer;
    font-weight:700;
    font-size:15px;
    color:var(--ink);
    transition:.15s;
    user-select:none;
  }
  .pill:hover{border-color:var(--sky);}
  .pill.active{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
    box-shadow:0 6px 16px rgba(27,27,69,.25);
  }

  /* family grid */
  .fam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  .fam{
    border:2px solid var(--line);
    border-radius:12px;
    padding:13px 8px;
    text-align:center;
    cursor:pointer;
    font-weight:700;
    font-size:14px;
    color:var(--navy);
    background:#fff;
    transition:.15s;
  }
  .fam:hover{border-color:var(--orange);}
  .fam.active{
    background:var(--orange);
    border-color:var(--orange);
    color:#fff;
    box-shadow:0 6px 14px rgba(244,121,60,.3);
  }
  .hint{font-size:12.5px;color:var(--muted);margin-top:10px;}

  /* criteria */
  .crit{
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:12px;
    background:var(--cream);
  }
  .crit-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .crit-name{font-weight:700;font-size:14.5px;color:var(--navy);}
  .crit-max{
    font-size:12px;font-weight:800;color:#fff;
    background:var(--green);
    padding:3px 10px;border-radius:20px;
  }
  .crit-row{display:flex;align-items:center;gap:12px;}
  input[type=range]{
    flex:1;
    -webkit-appearance:none;
    height:8px;border-radius:6px;
    background:var(--line);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:22px;height:22px;border-radius:50%;
    background:var(--orange);
    border:3px solid #fff;
    box-shadow:0 0 0 2px var(--orange);
    cursor:pointer;
  }
  .crit-val{
    width:48px;height:38px;
    border-radius:10px;
    border:2px solid var(--line);
    text-align:center;
    font-weight:800;font-size:15px;
    color:var(--navy);
    font-family:inherit;
  }
  .total-bar{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--navy);
    border-radius:14px;
    padding:16px 20px;
    color:#fff;
    margin-top:6px;
  }
  .total-bar .num{font-size:26px;font-weight:900;color:var(--yellow);}

  /* name input */
  input[type=text]{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:2px solid var(--line);
    font-family:inherit;
    font-size:15px;
    font-weight:600;
    color:var(--navy);
    background:#fff;
  }
  input[type=text]:focus{outline:none;border-color:var(--sky);}

  .submit-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,var(--orange),var(--orange-2));
    color:#fff;
    font-family:inherit;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(244,121,60,.3);
    transition:.15s;
  }
  .submit-btn:hover{transform:translateY(-1px);}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .msg{
    text-align:center;padding:14px;border-radius:12px;
    font-weight:700;font-size:14px;margin-bottom:16px;
  }
  .msg.ok{background:#e7f5ef;color:var(--green);}
  .msg.err{background:#fdeaea;color:#c0392b;}

</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div>
          <div class="brand-mark">مِراس</div>
          <div class="brand-sub">منافسة الأسر</div>
        </div>
      </div>
      <div class="badge">بطاقة تقييم اللجنة</div>
    </div>
    <div class="title">نموذج تقييم المنافسة</div>
    <div class="subtitle">اختر المرحلة والأسرة، ثم سجّل الدرجات وفق بنود التقييم المعتمدة لإصدار النتيجة بدقة.</div>
    <div class="strip"></div>
  </div>

  <!-- FORM VIEW -->
  <div id="formView">
    <div id="msgBox"></div>

    <div class="card">
      <h2><span class="step-num">1</span> اختر المرحلة</h2>
      <div class="pill-group" id="stageGroup"></div>
    </div>

    <div class="card" id="famCard" style="display:none;">
      <h2><span class="step-num">2</span> اختر الأسرة</h2>
      <div class="fam-grid" id="famGrid"></div>
      <div class="hint">اختر اسم الأسرة المشاركة في هذه الفقرة.</div>
    </div>

    <div class="card" id="critCard" style="display:none;">
      <h2><span class="step-num">3</span> بنود التقييم</h2>
      <div id="critList"></div>
      <div class="total-bar">
        <span>المجموع الكلي</span>
        <span class="num"><span id="totalScore">0</span> / 60</span>
      </div>
    </div>

    <div class="card" id="judgeCard" style="display:none;">
      <h2><span class="step-num">4</span> اسم المُقيِّم</h2>
      <input type="text" id="judgeName" placeholder="اكتب اسمك هنا">
    </div>

    <div id="submitWrap" style="display:none;">
      <button class="submit-btn" id="submitBtn" onclick="submitEvaluation()">إرسال التقييم</button>
    </div>
  </div>

</div>

<script>
const STAGES = {
  "متوسط": ["البناء","العطاء","الإباء","الإثراء","الإخاء","النقاء","النماء","السخاء"],
  "ثانوي": ["الكرامة","الشهامة","العزيمة","الجسارة","البسالة","الشجاعة"]
};
const CRITERIA = [
  { id:"creative", name:"إبراز الفكرة والإبداع في العرض", max:20 },
  { id:"innovate", name:"الابتكار في الإعلان", max:5 },
  { id:"value", name:"إيصال القيمة (قيمة الشكر)", max:25 },
  { id:"identity", name:"الهوية الجماعية", max:10 }
];
const MAX_TOTAL = CRITERIA.reduce((s,c)=>s+c.max,0);

let state = { stage:null, family:null, scores:{}, judge:"" };
CRITERIA.forEach(c=> state.scores[c.id]=0);

function buildStageGroup(){
  const el = document.getElementById('stageGroup');
  el.innerHTML='';
  Object.keys(STAGES).forEach(stage=>{
    const d=document.createElement('div');
    d.className='pill';
    d.textContent=stage;
    d.onclick=()=>selectStage(stage);
    el.appendChild(d);
  });
}
function selectStage(stage){
  state.stage = stage;
  state.family = null;
  document.querySelectorAll('#stageGroup .pill').forEach(p=>{
    p.classList.toggle('active', p.textContent===stage);
  });
  buildFamGrid();
  document.getElementById('famCard').style.display='block';
  document.getElementById('critCard').style.display='none';
  document.getElementById('judgeCard').style.display='none';
  document.getElementById('submitWrap').style.display='none';
}
function buildFamGrid(){
  const el = document.getElementById('famGrid');
  el.innerHTML='';
  STAGES[state.stage].forEach(fam=>{
    const d=document.createElement('div');
    d.className='fam';
    d.textContent=fam;
    d.onclick=()=>selectFamily(fam);
    el.appendChild(d);
  });
}
function selectFamily(fam){
  state.family = fam;
  document.querySelectorAll('#famGrid .fam').forEach(f=>{
    f.classList.toggle('active', f.textContent===fam);
  });
  buildCriteria();
  document.getElementById('critCard').style.display='block';
  document.getElementById('judgeCard').style.display='block';
  document.getElementById('submitWrap').style.display='block';
}
function buildCriteria(){
  const el = document.getElementById('critList');
  el.innerHTML='';
  CRITERIA.forEach(c=>{
    const row=document.createElement('div');
    row.className='crit';
    row.innerHTML=`
      <div class="crit-top">
        <span class="crit-name">${c.name}</span>
        <span class="crit-max">من ${c.max}</span>
      </div>
      <div class="crit-row">
        <input type="range" min="0" max="${c.max}" value="0" id="range_${c.id}" oninput="updateScore('${c.id}', this.value)">
        <input type="text" class="crit-val" id="val_${c.id}" value="0" inputmode="numeric" onchange="manualScore('${c.id}', this.value, ${c.max})">
      </div>
    `;
    el.appendChild(row);
  });
  updateTotal();
}
function updateScore(id, val){
  state.scores[id] = Number(val);
  document.getElementById('val_'+id).value = val;
  updateTotal();
}
function manualScore(id, val, max){
  let n = Math.max(0, Math.min(max, Number(val)||0));
  state.scores[id] = n;
  document.getElementById('val_'+id).value = n;
  document.getElementById('range_'+id).value = n;
  updateTotal();
}
function updateTotal(){
  const total = Object.values(state.scores).reduce((a,b)=>a+b,0);
  document.getElementById('totalScore').textContent = total;
}

function showMsg(text, ok){
  const box = document.getElementById('msgBox');
  box.innerHTML = `<div class="msg ${ok?'ok':'err'}">${text}</div>`;
  if(ok) setTimeout(()=>box.innerHTML='', 4000);
}

// ضع هنا رابط Google Apps Script بعد نشره (انظر التعليمات أسفل الملف المرفق)
const SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwT_a0SyLLKqehnXRFRFJZMV5R_mMI6vDvWkoK3E3BlKyp-qR6RXCNrmEnQ-ejo4mD7/exec";

async function submitEvaluation(){
  const judgeInput = document.getElementById('judgeName');
  state.judge = judgeInput.value.trim();

  if(!state.stage){ showMsg('الرجاء اختيار المرحلة', false); return; }
  if(!state.family){ showMsg('الرجاء اختيار الأسرة', false); return; }
  if(!state.judge){ showMsg('الرجاء كتابة اسم المُقيِّم', false); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'جارٍ الإرسال...';

  const total = Object.values(state.scores).reduce((a,b)=>a+b,0);
  const record = {
    stage: state.stage,
    family: state.family,
    judge: state.judge,
    creative: state.scores.creative,
    innovate: state.scores.innovate,
    value: state.scores.value,
    identity: state.scores.identity,
    total: total,
    ts: new Date().toLocaleString('ar-SA')
  };

  try{
    if(!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes('PASTE_YOUR')){
      throw new Error('لم يتم ربط رابط Google Sheets بعد');
    }
    await fetch(SHEET_WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(record)
    });
    showMsg('تم إرسال التقييم بنجاح ✓', true);
    resetForm();
  }catch(e){
    showMsg('حدث خطأ أثناء الإرسال، تأكد من ربط رابط الشيت وحاول مرة أخرى', false);
    console.error(e);
  }
  btn.disabled = false;
  btn.textContent = 'إرسال التقييم';
}

function resetForm(){
  state = { stage:null, family:null, scores:{}, judge:"" };
  CRITERIA.forEach(c=> state.scores[c.id]=0);
  document.querySelectorAll('#stageGroup .pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('famCard').style.display='none';
  document.getElementById('critCard').style.display='none';
  document.getElementById('judgeCard').style.display='none';
  document.getElementById('submitWrap').style.display='none';
  document.getElementById('judgeName').value='';
}
buildStageGroup();
</script>
</body>
</html>
